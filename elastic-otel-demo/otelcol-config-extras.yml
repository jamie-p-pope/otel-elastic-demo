# otelcol-config-extras.yml — Elastic demo collector overrides
#
# This file is copied over the upstream otelcol-config-extras.yml after cloning.
# See setup.sh Step 2.
#
# Merges with src/otel-collector/otelcol-config.yml via --config flag.

receivers:
  # Collect Docker container stdout/stderr logs from the host filesystem.
  # The collector has / → /hostfs, so host Docker logs are at /hostfs/var/lib/docker/containers.
  filelog/containers:
    include:
      - /hostfs/var/lib/docker/containers/*/*.log
    include_file_path: true
    include_file_name: false
    operators:
      # Docker writes logs as JSON: {"log":"...","stream":"stdout","time":"..."}
      - type: json_parser
        id: docker_json
      - type: move
        from: attributes.log
        to: body
      - type: move
        from: attributes.stream
        to: attributes["log.iostream"]
      - type: remove
        field: attributes.time

processors:
  resourcedetection/system:
    # Overrides the main config's resourcedetection/system processor.
    # ec2 is listed LAST so its attributes win when override: true.
    # With override: true, each detector overwrites the previous — putting ec2
    # last ensures host.name = EC2 hostname (not the Docker container's hostname).
    # Requires IMDSv2 hop limit >= 2 on the EC2 instance (set in main.tf).
    detectors: [env, docker, system, ec2]
    timeout: 5s
    override: true

service:
  pipelines:
    # New pipeline for Docker container logs — separate from the existing
    # "logs" pipeline (which only collects OTLP-pushed logs from apps).
    logs/container:
      receivers: [filelog/containers]
      processors: [resourcedetection/system, batch]
      exporters: [elasticsearch/otel]
